    <header class="site-nav">
      <a class="logo" href="index.html">

      <nav class="nav-links">

        <a class="active" href="work.html">Work</a>
        <a href="services.html">Services</a>

      <button class="btn nav-cta magnetic">Start a Project</button>

    <div class="mobile-menu" aria-hidden="true">

    <main class="site">
      <section class="section g4-secondary pocket-top">
        <div class="resizable-box" id="fastiv-1">
          <video
            class="g4-video-secondary"
            autoplay
            muted
            loop
            playsinline
            src="assets/fastiv/1.mp4"
          ></video>
        </div>
      </section>

      <section class="section g4-secondary">
        <div class="resizable-box" id="fastiv-2" data-draggable>
          <img
            class="g4-image-secondary"
            src="assets/fastiv/2.png"
            alt="Fastiv frame 2"
          />
        </div>
      </section>

      <section class="section g4-secondary">
        <div class="resizable-box" id="fastiv-3" data-draggable>

            class="g4-image-secondary"

      <section class="section g4-secondary">

            alt="Fastiv frame 4"
          />

      </section>

      <section class="section g4-secondary">
        <div class="resizable-box" id="fastiv-5" data-draggable>
          <video
            class="g4-video-secondary"
            autoplay

            loop
            playsinline
            src="assets/fastiv/5.mp4"
          ></video>
        </div>
      </section>

      <section class="section g4-secondary">
        <div class="resizable-box" id="fastiv-6" data-draggable>

            autoplay
            muted
            loop
            playsinline
            src="assets/fastiv/6.mp4"
          ></video>
        </div>

    <div class="mobile-project-modal contact-modal" aria-hidden="true">
      <div class="contact-modal-overlay"></div>
      <div class="contact-modal-card" role="dialog" aria-modal="true">
        <p><strong>This project isn’t optimized</strong></p>
        <p><strong>for mobile yet ;(</strong></p>
        <p>For a better user experience, please use a desktop version</p>
        <button class="contact-modal-close" type="button">Close</button>
      </div>
    </div>

    <div class="contact-modal" aria-hidden="true">

        <button class="contact-modal-close" type="button" aria-label="Close">&times;</button>
        <h3>Let's create <em>together:</em></h3>
        <div class="contact-modal-links">
          <a href="mailto:pocketagency@outlook.com">pocketagency@outlook.com</a>
          <a href="tel:+353894930434">+353 89 493 0434</a>
        </div>
        <p class="contact-modal-note">We usually reply within a day.</p>
      </div>
